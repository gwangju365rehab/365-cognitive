<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>판단력 훈련 - 광주365재활병원</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; padding: 16px 16px 80px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff; color: #222;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      min-height: 100vh;
    }
    h1 { margin: 0 0 2px; font-size: 1.9rem; font-weight: 800; text-align: center; }
    #home-btn {
      position: fixed; top: 14px; left: 14px; z-index: 100;
      padding: 10px 18px; border-radius: 999px; border: none;
      background: #eee; color: #333; font-weight: 600; font-size: 14px;
      cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    #home-btn:hover { background: #ddd; }

    #cat-tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; max-width: 720px; }
    .cat-tab {
      padding: 10px 18px; border-radius: 999px; border: 2px solid #ddd;
      cursor: pointer; font-size: 0.95rem; font-weight: 700;
      background: #fff; color: #555; transition: all .15s;
    }
    .cat-tab:hover { border-color: #1976d2; background: #e8f2ff; color: #1976d2; }
    .cat-tab.active { background: #1976d2; border-color: #1976d2; color: #fff; }

    .progress-wrap { width: 100%; max-width: 680px; }
    .progress-bar-bg { width: 100%; height: 10px; border-radius: 999px; background: #f0f4fa; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 999px; background: #1976d2; transition: width .4s; }
    .progress-txt { font-size: 0.95rem; color: #666; text-align: center; margin-top: 4px; }
    .progress-txt span { font-weight: 800; color: #222; }

    #situation-card {
      width: 100%; max-width: 680px;
      border-radius: 20px; border: 2px solid #e0e8f8;
      background: #f7f9ff; overflow: hidden;
    }
    .card-category { padding: 10px 20px; font-size: 0.88rem; font-weight: 800; letter-spacing: 1px; }
    .card-emoji { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 5rem; background: #eef2ff; }
    .card-text { padding: 20px 22px 8px; font-size: 1.2rem; font-weight: 700; line-height: 1.7; color: #1a1a2e; }
    .card-question { padding: 0 22px 18px; font-size: 1rem; font-weight: 600; color: #1976d2; }

    #choices { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 12px; }
    .choice-btn {
      width: 100%; padding: 16px 18px;
      border-radius: 14px; border: 2.5px solid #dde3ec;
      background: #fff; text-align: left;
      font-size: 1.05rem; font-weight: 600; color: #222; line-height: 1.5;
      cursor: pointer; transition: all .15s; display: flex; align-items: flex-start; gap: 10px;
    }
    .choice-btn:hover:not(:disabled) { border-color: #1976d2; background: #e8f2ff; }
    .choice-btn:active:not(:disabled) { transform: scale(0.99); }
    .choice-btn:disabled { cursor: default; }
    .choice-label {
      min-width: 30px; height: 30px; border-radius: 50%;
      background: #eee; color: #555;
      font-size: 0.9rem; font-weight: 800; text-align: center; line-height: 30px;
      flex-shrink: 0;
    }
    .choice-btn.correct { border-color: #388e3c; background: #f0fff4; }
    .choice-btn.correct .choice-label { background: #388e3c; color: #fff; }
    .choice-btn.wrong   { border-color: #d32f2f; background: #fff5f5; }
    .choice-btn.wrong .choice-label   { background: #d32f2f; color: #fff; }

    #feedback-box {
      display: none; width: 100%; max-width: 680px;
      border-radius: 16px; padding: 18px 22px;
      border: 2px solid #ddd; background: #fafafa;
    }
    #feedback-box.correct { border-color: #388e3c; background: #f0fff4; }
    #feedback-box.wrong   { border-color: #d32f2f; background: #fff5f5; }
    .feedback-result { font-size: 1.3rem; font-weight: 900; margin-bottom: 8px; }
    .feedback-result.ok  { color: #2e7d32; }
    .feedback-result.err { color: #c62828; }
    .feedback-explain {
      font-size: 1rem; color: #333; line-height: 1.8;
      border-top: 1px solid #ddd; padding-top: 10px; margin-top: 8px;
    }
    .feedback-explain b { color: #1565c0; }

    .ctrl-wrap { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 680px; }
    .ctrl-btn {
      padding: 14px 34px; border-radius: 999px; border: none;
      font-size: 1.05rem; font-weight: 800; cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15); transition: transform .08s;
    }
    .ctrl-btn:active { transform: translateY(1px); }
    .btn-start { background: #1976d2; color: #fff; }
    .btn-start:hover { background: #1565c0; }
    .btn-next  { background: #388e3c; color: #fff; display: none; }
    .btn-next:hover { background: #2e7d32; }
    .btn-reset { background: #eee; color: #333; }
    .btn-reset:hover { background: #ddd; }

    #result-box {
      display: none; width: 100%; max-width: 500px;
      padding: 24px 28px; border-radius: 20px;
      border: 1px solid #ddd; background: #fafafa; text-align: center;
    }
    #result-box h2 { margin: 0 0 16px; font-size: 1.5rem; }
    .r-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 1rem; }
    .r-row:last-of-type { border: none; }
    .r-val { font-weight: 800; color: #1976d2; }
    .result-btns { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }

    .cat-safety  { background: #fff3e0; color: #e65100; border-bottom: 3px solid #ff9800; }
    .cat-cooking { background: #fce4ec; color: #880e4f; border-bottom: 3px solid #e91e63; }
    .cat-public  { background: #e8f5e9; color: #1b5e20; border-bottom: 3px solid #4caf50; }

    #hospital-logo {
      position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: #666;
      padding: 5px 10px; background: rgba(255,255,255,0.9); border-radius: 4px; font-weight: 500;
    }
    @media (max-width: 480px) {
      .card-text { font-size: 1.05rem; }
      .choice-btn { font-size: 0.97rem; padding: 14px 14px; }
    }
  
    /* ── 터치스크린 최적화 ── */
    * { -webkit-tap-highlight-color: rgba(0,0,0,0.08); touch-action: manipulation; }
    button, .choice-btn, .quiz-opt, .stim-card, .menu-item, .opt-btn,
    .cat-btn, .diff-card, .health-card, .topic-card, .mode-card,
    .kcal-card, .predict-btn, .tab-btn, .nav-item, .setting-btn,
    .ctrl-btn, .action-btn, .start-btn, .btn-start, .btn-end,
    .btn-restart, .btn-primary, .btn-secondary, .rule-change-btn {
      min-height: 48px;
      cursor: pointer;
    }
    @media (hover: none) {
      button:hover, .choice-btn:hover, .quiz-opt:hover,
      .stim-card:hover, .menu-item:hover, .opt-btn:hover,
      .cat-btn:hover, .diff-card:hover, .health-card:hover,
      .topic-card:hover, .mode-card:hover, .kcal-card:hover,
      .predict-btn:hover, .tab-btn:hover, .nav-item:hover,
      .setting-btn:hover, .ctrl-btn:hover, .action-btn:hover,
      .start-btn:hover, .btn-start:hover, .btn-end:hover,
      .btn-restart:hover, .btn-primary:hover, .btn-secondary:hover,
      .rule-change-btn:hover {
        transform: none !important;
      }
    }
    /* 터치 활성 피드백 */
    button:active, .choice-btn:active, .quiz-opt:active,
    .stim-card:active, .menu-item:active, .opt-btn:active,
    .cat-btn:active, .diff-card:active, .health-card:active {
      opacity: 0.75;
      transition: opacity 0.05s;
    }

    </style>
</head>
<body>
<button id="home-btn" onclick="location.href='index.html'">← 홈</button>
<h1>판단력 훈련</h1>
<div style="font-size:0.95rem;color:#666;text-align:center">상황을 읽고 가장 적절한 행동을 선택하세요.</div>

<div id="cat-tabs">
  <button class="cat-tab active" data-cat="all">전체</button>
  <button class="cat-tab" data-cat="safety">일상 안전</button>
  <button class="cat-tab" data-cat="cooking">요리 / 음식</button>
  <button class="cat-tab" data-cat="public">공공장소</button>
</div>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-txt">문제 <span id="prog-cur">1</span> / <span id="prog-tot">10</span> &nbsp;|&nbsp; 정답 <span id="prog-score">0</span>개</div>
</div>

<div id="situation-card" style="display:none">
  <div class="card-category" id="card-cat"></div>
  <div class="card-emoji"    id="card-img"></div>
  <div class="card-text"     id="card-text"></div>
  <div class="card-question" id="card-question"></div>
</div>

<div id="choices"></div>

<div id="feedback-box">
  <div class="feedback-result"  id="fb-result"></div>
  <div class="feedback-explain" id="fb-explain"></div>
</div>

<div class="ctrl-wrap">
  <button class="ctrl-btn btn-start" id="btn-start" onclick="G.start()">훈련 시작</button>
  <button class="ctrl-btn btn-next"  id="btn-next"  onclick="G.next()">다음 문제 →</button>
  <button class="ctrl-btn btn-reset" onclick="G.reset()">다시하기</button>
</div>

<div id="result-box">
  <h2>🎉 훈련 완료!</h2>
  <div class="r-row"><span>카테고리</span><span class="r-val" id="r-cat"></span></div>
  <div class="r-row"><span>총 문제</span><span class="r-val"  id="r-total"></span></div>
  <div class="r-row"><span>정답 수</span><span class="r-val"  id="r-correct"></span></div>
  <div class="r-row"><span>정확도</span><span class="r-val"   id="r-acc"></span></div>
  <div class="result-btns">
    <button class="ctrl-btn btn-start" onclick="G.reset();G.start()">다시 훈련</button>
    <button class="ctrl-btn btn-reset" onclick="location.href='index.html'">홈으로</button>
  </div>
</div>

<div id="hospital-logo">광주365재활병원_인지연하팀</div>

// ─────────────────────────────────────────────────────────────

    text:'공중화장실에서 용무를 마쳤습니다.',
    question:'나가기 전에 반드시 해야 할 행동은 무엇인가요?',
    choices:['물을 내리고 손을 깨끗이 씻는다.','물만 내리고 나간다.','손만 씻고 나간다.','그냥 나간다.'],
    explain:'공중 위생을 위해 <b>변기 물을 내리고</b>, 감염 예방을 위해 반드시 <b>손을 깨끗이 씻어야</b> 합니다.' },

  { cat:'public', catLabel:'공공장소', catClass:'cat-public', emoji:'🍽️',
    text:'식당에서 음식을 주문했는데 나온 음식에서 이물질이 발견됐습니다.',
    question:'어떻게 하는 것이 가장 적절한가요?',
    choices:['직원을 불러 차분하게 이물질을 보여주고 교환이나 환불을 요청한다.','그냥 이물질을 빼고 먹는다.','SNS에 바로 올린다.','크게 소리를 지른다.'],
    explain:'<b>직원에게 차분하게 상황을 알리고</b> 교환이나 환불을 요청하는 것이 올바른 방법입니다. 이물질 섭취 시 건강에 해롭습니다.' },

  { cat:'public', catLabel:'공공장소', catClass:'cat-public', emoji:'🌩️',
    text:'야외에 있는데 갑자기 천둥·번개가 심하게 칩니다.',
    question:'가장 안전한 행동은 무엇인가요?',
    choices:['즉시 건물 안이나 자동차 안으로 대피한다.','나무 아래에서 비를 피한다.','우산을 들고 그대로 있는다.','높은 곳으로 올라가 상황을 살핀다.'],
    explain:'번개는 높은 곳이나 나무를 먼저 칩니다. <b>나무 아래와 개방된 공간은 위험</b>합니다. 즉시 <b>건물 안이나 자동차 안</b>으로 대피하세요.' },

  { cat:'public', catLabel:'공공장소', catClass:'cat-public', emoji:'🏪',
    text:'편의점에서 물건을 계산하려는데 카드가 결제되지 않습니다.',
    question:'어떻게 하는 것이 가장 적절한가요?',
    choices:['카드사에 전화하거나 다른 결제 수단을 사용한다.','점원에게 화를 낸다.','물건을 가져가고 나중에 갚겠다고 한다.','그냥 물건을 놔두고 나간다.'],
    explain:'카드 결제 오류 시 먼저 <b>카드사에 문의</b>하거나 <b>다른 결제 수단(현금, 다른 카드)을 사용</b>하는 것이 올바른 대처입니다.' },

// ─────────────────────────────────────────────────────────────
//  게임 로직
// ─────────────────────────────────────────────────────────────
const G = (() => {
  let queue=[], idx=0, score=0, answered=false, currentCat='all';
  // 각 문항의 셔플된 보기 순서 저장
  let shuffledChoices=[], correctIdxInShuffled=0;

  const catCard   = document.getElementById('card-cat');
  const imgEl     = document.getElementById('card-img');
  const textEl    = document.getElementById('card-text');
  const qEl       = document.getElementById('card-question');
  const choicesEl = document.getElementById('choices');
  const fbBox     = document.getElementById('feedback-box');
  const fbResult  = document.getElementById('fb-result');
  const fbExplain = document.getElementById('fb-explain');
  const card      = document.getElementById('situation-card');
  const progWrap  = document.getElementById('progress-wrap');
  const progFill  = document.getElementById('prog-fill');
  const startBtn  = document.getElementById('btn-start');
  const nextBtn   = document.getElementById('btn-next');
  const resultBox = document.getElementById('result-box');

  const CAT_LABELS = { all:'전체', safety:'일상 안전', cooking:'요리 / 음식', public:'공공장소' };

  function shuffle(arr) {
    const a=[...arr];
    for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  function start() {
    const filtered = currentCat==='all' ? [...Q] : Q.filter(q=>q.cat===currentCat);
    queue = shuffle(filtered);
    idx=0; score=0; answered=false;
    card.style.display='block';
    progWrap.style.display='block';
    resultBox.style.display='none';
    fbBox.style.display='none';
    startBtn.style.display='none';
    nextBtn.style.display='none';
    document.getElementById('prog-tot').textContent=queue.length;
    loadQ();
  }

  function loadQ() {
    answered=false;
    fbBox.style.display='none';
    nextBtn.style.display='none';

    const q = queue[idx];

    // 보기 순서 랜덤 섞기 (정답은 항상 index 0)
    const choiceObjs = q.choices.map((text,i)=>({ text, isCorrect: i===0 }));
    shuffledChoices = shuffle(choiceObjs);
    correctIdxInShuffled = shuffledChoices.findIndex(c=>c.isCorrect);

    catCard.textContent  = q.catLabel;
    catCard.className    = 'card-category '+q.catClass;
    imgEl.textContent    = q.emoji;
    textEl.textContent   = q.text;
    qEl.textContent      = q.question;

    choicesEl.innerHTML='';
    const labels=['①','②','③','④'];
    shuffledChoices.forEach((c,i)=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.innerHTML=`<span class="choice-label">${labels[i]}</span>${c.text}`;
      btn.onclick=()=>answer(i);
      choicesEl.appendChild(btn);
    });

    progFill.style.width=(idx/queue.length*100)+'%';
    document.getElementById('prog-cur').textContent=idx+1;
    document.getElementById('prog-score').textContent=score;
  }

  function answer(chosen) {
    if (answered) return;
    answered=true;

    const q=queue[idx];
    const btns=choicesEl.querySelectorAll('.choice-btn');
    btns.forEach(b=>b.disabled=true);

    const isCorrect=chosen===correctIdxInShuffled;
    if (isCorrect) score++;

    btns.forEach((b,i)=>{
      if (i===correctIdxInShuffled) b.classList.add('correct');
      else if (i===chosen&&!isCorrect) b.classList.add('wrong');
    });

    fbBox.style.display='block';
    fbBox.className=isCorrect?'correct':'wrong';
    fbResult.textContent=isCorrect?'✓ 정답입니다!':'✗ 틀렸어요.';
    fbResult.className='feedback-result '+(isCorrect?'ok':'err');
    fbExplain.innerHTML=q.explain;

    progFill.style.width=((idx+1)/queue.length*100)+'%';
    document.getElementById('prog-score').textContent=score;
    nextBtn.textContent=idx+1>=queue.length?'결과 보기 →':'다음 문제 →';
    nextBtn.style.display='inline-block';
  }

  function next() {
    idx++;
    if (idx>=queue.length) { end(); return; }
    loadQ();
  }

  function end() {
    card.style.display='none';
    choicesEl.innerHTML='';
    fbBox.style.display='none';
    nextBtn.style.display='none';
    progFill.style.width='100%';

    document.getElementById('r-cat').textContent    =CAT_LABELS[currentCat];
    document.getElementById('r-total').textContent  =queue.length+'문제';
    document.getElementById('r-correct').textContent=score+'문제';
    document.getElementById('r-acc').textContent    =Math.round(score/queue.length*100)+'%';
    resultBox.style.display='block';
  }

  function reset() {
    idx=0; score=0; answered=false;
    card.style.display='none';
    choicesEl.innerHTML='';
    fbBox.style.display='none';
    progWrap.style.display='none';
    nextBtn.style.display='none';
    startBtn.style.display='inline-block';
    resultBox.style.display='none';
    progFill.style.width='0%';
  }

  document.querySelectorAll('.cat-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentCat=tab.dataset.cat;
    });
  });

  return { start, next, reset };
})();
</script>
</body>
</html>
